<!-- INIT Certificate Template -->
<div data-event="INIT" style="width: 100%; height: 100%; display: none; flex-direction: column; justify-content: space-between; align-items: center; padding: 30px; box-sizing: border-box; border: 10px solid rgba(34, 197, 94, 0.25); background: linear-gradient(to bottom right, #ffffff, #f0fdf4); color: #111827; font-family: Arial, sans-serif;">
  <div style="text-align: center;">
    <p style="font-size: 12px; text-transform: uppercase; letter-spacing: 0.35em; color: #6b7280; margin: 0;">National Digital Innovation</p>
    <h3 style="font-size: 36px; margin: 6px 0; color: #22c55e;">INIT 2026</h3>
    <p style="font-size: 18px; color: #6b7280; margin: 0;">Innovation Nation</p>
  </div>
  <div style="text-align: center; max-width: 700px;">
    <p style="font-size: 14px; color: #6b7280;">This certifies that</p>
    <p style="font-size: 36px; font-weight: bold;" data-field="name"></p>
    <p style="font-size: 20px; color: #6b7280;" data-field="institution"></p>
    <div style="margin: 20px 0; font-size: 12px; color: #6b7280;">Details</div>
    <div style="font-size: 14px;">
      <p><span style="color: #6b7280;">Segment:</span> <span data-field="segment"></span></p>
      <p><span style="color: #6b7280;">Prize place:</span> <span data-field="prize_place"></span></p>
      <p><span style="color: #6b7280;">Installment:</span> <span data-field="installment"></span></p>
    </div>
  </div>
  <div style="display: flex; justify-content: space-between; width: 100%; font-size: 12px; color: #6b7280;">
    <span data-field="code"></span>
    <span>Certificate Verification System</span>
  </div>
</div>
