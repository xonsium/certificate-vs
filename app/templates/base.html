<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="csrf-token" content="{{ csrf_token() }}" />
    <title>{% block title %}Certificate Verification{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
            },
            colors: {
              brand: {
                primary: "var(--color-primary)",
                bgdark: "var(--color-background-dark)",
                surfacedark: "var(--color-surface-dark)",
                muted: "var(--color-text-muted)",
                bglight: "var(--color-background-light)",
              },
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
    {% block head_extra %}{% endblock %}
  </head>
  <body class="min-h-screen bg-gray-50 text-gray-800 font-sans antialiased">
    {% block body %}{% endblock %}
    {% block scripts %}{% endblock %}
  </body>
</html>
