{% extends "base.html" %}
{% block title %}Admin sign in{% endblock %}
{% block body %}
  <div class="min-h-screen flex items-center justify-center px-4 bg-brand-bglight">
    <div class="card w-full max-w-md bg-base-100 shadow-lg border border-base-300/80 step-enter">
      <div class="card-body gap-4">
        <h1 class="text-2xl font-semibold text-neutral">Admin sign in</h1>
        <form method="post" class="space-y-4">
          {{ form.hidden_tag() }}
          <label class="form-control w-full">
            <span class="label-text">{{ form.username.label }}</span>
            {{ form.username(class_="input input-bordered w-full") }}
            {% for e in form.username.errors %}
              <span class="text-error text-sm">{{ e }}</span>
            {% endfor %}
          </label>
          <label class="form-control w-full">
            <span class="label-text">{{ form.password.label }}</span>
            {{ form.password(class_="input input-bordered w-full") }}
            {% for e in form.password.errors %}
              <span class="text-error text-sm">{{ e }}</span>
            {% endfor %}
          </label>
          {{ form.submit(class_="btn btn-primary w-full") }}
        </form>
        <a href="{{ url_for('public.index') }}" class="link link-hover text-sm text-brand-muted"
          >← Back to verification</a
        >
      </div>
    </div>
  </div>
{% endblock %}
