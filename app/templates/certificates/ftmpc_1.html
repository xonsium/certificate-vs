<section
  class="cert-template active w-full h-full flex-col items-center justify-between p-14 border-[12px] border-blue-600/25 bg-gradient-to-br from-white to-gray-100 text-gray-800"
  data-event-template="FTMPC"
  data-installment="1"
>
  <div class="w-full text-center space-y-2">
    <p class="text-xs uppercase tracking-[0.35em] text-gray-500">Certificate of Achievement</p>
    <h3 class="text-4xl font-semibold text-blue-600 tracking-tight">FTMPC</h3>
    <p class="text-lg text-gray-500 font-medium">Future Tech & Media Programming Challenge</p>
    <p class="text-sm text-blue-600 font-medium mt-2">Installment 1</p>
  </div>
  <div class="text-center space-y-6 max-w-2xl">
    <p class="text-sm text-gray-500">This certifies that</p>
    <p class="text-4xl font-semibold leading-tight">{{ name }}</p>
    <p class="text-xl text-gray-500">{{ institution }}</p>
    <div class="border-t border-gray-200 my-4 text-gray-500 text-xs">Details</div>
    <div class="grid grid-cols-1 gap-2 text-base">
      <p><span class="text-gray-500">Segment:</span> <span>{{ segment }}</span></p>
      <p><span class="text-gray-500">Prize place:</span> <span>{{ prize_place }}</span></p>
      <p><span class="text-gray-500">Installment:</span> <span>{{ installment }}</span></p>
    </div>
  </div>
  <div class="w-full flex justify-between items-end text-xs text-gray-500">
    <span>Code: {{ code }}</span>
    <span>Certificate Verification System</span>
  </div>
</section>
