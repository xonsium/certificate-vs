<section
  class="cert-template w-full h-full flex-col items-center justify-between p-14 border-[12px] border-accent/30 bg-gradient-to-br from-base-100 to-base-200 text-neutral"
  data-event-template="PixelCon"
>
  <div class="w-full text-center space-y-2">
    <p class="text-xs uppercase tracking-[0.35em] text-brand-muted">Certificate of Recognition</p>
    <h3 class="text-4xl font-semibold text-brand-primary tracking-tight">PixelCon</h3>
    <p class="text-lg text-brand-muted font-medium">Creative Digital Conference</p>
  </div>
  <div class="text-center space-y-6 max-w-2xl">
    <p class="text-sm text-brand-muted">This certifies that</p>
    <p class="text-4xl font-semibold leading-tight">{{ name }}</p>
    <p class="text-xl text-brand-muted">{{ institution }}</p>
    <div class="divider text-brand-muted text-xs">Details</div>
    <div class="grid grid-cols-1 gap-2 text-base">
      <p><span class="text-brand-muted">Segment:</span> <span>{{ segment }}</span></p>
      <p><span class="text-brand-muted">Prize place:</span> <span>{{ prize_place }}</span></p>
      <p><span class="text-brand-muted">Installment:</span> <span>{{ installment }}</span></p>
    </div>
  </div>
  <div class="w-full flex justify-between items-end text-xs text-brand-muted">
    <span>Code: {{ code }}</span>
    <span>Certificate Verification System</span>
  </div>
</section>
